# Manual macOS CI for xwpe.
#
# Codeberg/Forgejo has no macOS runners, so macOS coverage runs on the GitHub
# push-mirror (github.com/vejeta/xwpe) using GitHub's free macOS runners. It is
# "workflow_dispatch" ONLY -- it never runs on push; you launch it on demand
# from the Actions tab ("Run workflow") or with:
#     gh workflow run macos.yml --repo vejeta/xwpe
#
# It runs on BOTH architectures, because they are genuinely different targets:
#   - macos-14  : Apple Silicon (arm64)
#   - macos-13  : Intel (x86_64)   <- the arch Homebrew bottles as "*-x86_64"
# Skipping Intel here is what let an x86_64-only regression reach Homebrew-core
# unseen, so both are first-class in the matrix now.
#
# What it guards: the console build links and runs on each arch; the
# macOS-specific console-mouse behaviour (arrow-cursor / drag-spin fixes) keeps
# working; and -- mirroring the Homebrew formula's own `test do` block -- that
# `wpe` drives a real pseudo-terminal, initialises ncurses, and paints an opened
# file's contents on screen. X11 (XQuartz) is out of scope here; it is
# heavy/flaky in CI and covered by the Homebrew tap.

name: macOS (manual)

on:
  workflow_dispatch:

jobs:
  macos:
    name: macOS console (${{ matrix.runner }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14   # Apple Silicon (arm64)
          - runner: macos-13   # Intel (x86_64)
    runs-on: ${{ matrix.runner }}
    env:
      HOMEBREW_NO_AUTO_UPDATE: "1"
      HOMEBREW_NO_INSTALL_CLEANUP: "1"
      # The runner ships extra prebuilt taps (aws/tap, azure/bicep) we never use;
      # silence the upcoming tap-trust warning instead of chasing them.
      HOMEBREW_NO_REQUIRE_TAP_TRUST: "1"
    steps:
      - uses: actions/checkout@v5

      - name: Show arch
        run: |
          uname -m
          sw_vers || true

      - name: Install deps
        run: brew install autoconf automake pkgconf ncurses json-c libvterm texinfo

      - name: Build (--without-x)
        run: |
          # ncurses is keg-only on macOS: point pkg-config at its ncursesw.pc.
          export PKG_CONFIG_PATH="$(brew --prefix ncurses)/lib/pkgconfig"
          autoreconf -fi
          ./configure --without-x --without-gpm
          make

      - name: make check
        # LSP/DAP server tests SKIP when their server is absent. But GitHub's
        # macOS runner ships rust-analyzer + cargo, so test_lsp_rust runs instead
        # of skipping, and its cold start (indexing std + cargo-check) exceeds the
        # test's wait budget on a fresh runner -- a flaky timeout, not an xwpe
        # fault. The Rust LSP path is covered by the Linux CI, so exclude just
        # that one test here (everything else passes or skips cleanly).
        run: >-
          make check
          TESTS="test_checkheader test_syntax_def test_fdloop test_clipboard
          test_lsp_buffer test_lsp_doctor test_lsp_semantic test_lsp_truecolor
          test_dap test_dap_dlv test_dap_gdb test_dap_lldb test_dap_scala
          test_lsp_scala test_lsp_clangd test_lsp_python test_lsp_gopls"

      - name: pyte UI regression suite (keystrokes, menus, editing, rendering)
        # The terminal UI is what users actually touch, and "simple" key/render
        # regressions -- like Backspace not erasing on macOS terminals, which send
        # DEL (0x7f) rather than BS -- slip straight past a C-only `make check`.
        # Drive the real ncurses UI through a pseudo-terminal with pyte and assert
        # on the screen and the file written to disk. Scope: the deterministic
        # key / menu / editing / rendering scenarios. The language-server, DAP
        # debugger and compile+run pipelines are toolchain-bound and timing-heavy;
        # they are covered by the Linux CI and the C `make check` above, so they
        # are excluded here to keep this gate fast and flake-free.
        env:
          # GitHub's macOS runners are markedly slower than the Linux ones (the
          # suite takes ~10x longer here), so the per-scenario wait budgets that
          # pass in-tree flake at the default scale. Stretch every wait by 3x,
          # exactly as the Debian autopkgtest does, instead of weakening the
          # assertions.
          XWPE_TEST_WAIT_SCALE: "3"
          # A login-shell TERM the macOS-smoke sanity check expects (CI shells
          # have none); the editor under test always gets its own TERM regardless.
          TERM: "xterm-256color"
        run: |
          python3 -m venv /tmp/ptenv
          /tmp/ptenv/bin/pip install --quiet pyte==0.8.1 pytest
          # Load the in-app help from the checkout (the editor's "_eng" fallback)
          # so the Help/manual scenarios pass without a `make install`.
          export XWPE_LIB="$PWD"
          # The function-key UI actions (Save/Find/Make/Help/File-Manager/menu
          # entry) are driven through their macOS menu routes by the harness,
          # since macOS reserves F1-F12; only the toolchain-bound language-server,
          # DAP and broader compile/debug pipeline tests stay on the Linux CI.
          WPE_BIN="$PWD/wpe" /tmp/ptenv/bin/python -m pytest -q tests --ignore=tests/x11 -k "not (clangd or gopls or rust or scala or metals or python_lsp or go_dap or dap or algol68 or ga68 or truecolor_console or compile or make_output or build_cwd or user_screen or debugger_watchdog or ctrl_f9 or alt_f5)"

      - name: Homebrew test-block reproduction (PTY drive)
        if: always()   # validate the formula fix even if a pyte UI test flaked
        # Mirrors the Formula/x/xwpe.rb `test do` block exactly, so a failure here
        # is a failure Homebrew-core would hit. Drives `wpe` under a pseudo-terminal
        # with a file holding a unique marker and asserts ncurses both emitted an
        # escape sequence (drew the screen) and rendered the marker (loaded the
        # buffer). Reads with a BLOCKING readpartial that treats EOF -- which a
        # closed pty surfaces as Errno::EIO on macOS -- as end-of-capture, so a
        # fast-exiting child can never spin the loop to a spurious empty-output
        # timeout (the x86_64-only failure mode of the earlier read_nonblock poll).
        run: |
          cat > /tmp/brew_test.rb <<'RUBY'
          require "pty"
          require "io/console"
          require "timeout"
          require "tmpdir"

          marker = "XWPE_BREW_TEST_MARKER"
          Dir.mktmpdir do |dir|
            path = File.join(dir, "hello.c")
            File.write(path, "// #{marker}\nint main(void) { return 0; }\n")
            ENV["TERM"] = "xterm-256color"

            output = +""
            PTY.spawn("./wpe", path) do |r, w, pid|
              r.winsize = [24, 80]
              begin
                Timeout.timeout(30) do
                  loop do
                    begin
                      chunk = r.readpartial(4096)
                    rescue Errno::EIO, EOFError
                      break
                    end
                    output << chunk
                    break if output.include?(marker)
                  end
                end
                w.write "\ex" # Alt-X -> quit (best effort; child may be gone)
              rescue Timeout::Error, Errno::EIO
                nil
              ensure
                begin
                  Process.kill("TERM", pid)
                rescue Errno::ESRCH
                  nil
                end
              end
            end

            puts "captured #{output.bytesize} bytes; ESC[=#{output.match?(/\e\[/)} marker=#{output.include?(marker)}"
            raise "ncurses did not draw the screen" unless output.match?(/\e\[/)
            raise "marker not rendered" unless output.include?(marker)
            puts "OK"
          end
          RUBY
          ruby /tmp/brew_test.rb

      - name: Diagnose the INSTALLED binary (true Homebrew condition)
        if: always()
        # The step above runs ./wpe from the BUILD TREE with XWPE_LIB=$PWD, which
        # is NOT what `brew test` does: Homebrew runs the INSTALLED wpe with no
        # XWPE_LIB. If the installed binary cannot find its data (terminfo, help,
        # syntax) it can die before painting -> 0 bytes, exactly the homebrew-core
        # failure. Reproduce faithfully: configure with a real --prefix, install
        # there, then drive the installed wpe with NO XWPE_LIB, dumping everything.
        run: |
          set +e   # diagnostic step: gather everything; never fail the job on a sub-command
          export PKG_CONFIG_PATH="$(brew --prefix ncurses)/lib/pkgconfig"
          ./configure --prefix=/tmp/xp --without-x --without-gpm >/tmp/cf2.log 2>&1
          make >/tmp/mk2.log 2>&1
          make install >/tmp/inst.log 2>&1 || { echo "INSTALL FAILED"; tail -20 /tmp/inst.log; }
          echo "=== installed tree ==="; ls -l /tmp/xp/bin/ ; echo "--- share ---"; ls -R /tmp/xp/share 2>/dev/null | head -20; echo "--- lib/xwpe ---"; ls /tmp/xp/lib/xwpe 2>/dev/null
          echo "=== otool -L installed we (dylib resolution) ==="; otool -L /tmp/xp/bin/we 2>/dev/null
          echo "=== terminfo xterm-256color present? ==="; infocmp xterm-256color >/dev/null 2>&1 && echo FOUND || echo MISSING
          echo "=== run INSTALLED wpe under a pty, NO XWPE_LIB, capture all + timing ==="
          cat > /tmp/probe.rb <<'RUBY'
          require "pty"; require "io/console"; require "timeout"
          ENV["TERM"] = "xterm-256color"
          File.write("/tmp/h.c", "// XWPE_BREW_TEST_MARKER\nint main(void){return 0;}\n")
          o = +""; k = nil; t = Time.now
          PTY.spawn("/tmp/xp/bin/wpe", "/tmp/h.c") do |r, _w, pid|
            r.winsize = [24, 80]
            begin
              Timeout.timeout(12) do
                loop do
                  begin; o << r.readpartial(4096); rescue Errno::EIO, EOFError; break; end
                  break if o.include?("XWPE_BREW_TEST_MARKER")
                end
              end
            rescue => e; k = e.class
            ensure; (Process.kill("TERM", pid) rescue nil)
            end
          end
          puts "INSTALLED: elapsed=#{(Time.now - t).round(1)}s bytes=#{o.bytesize} exc=#{k} esc=#{o.match?(/\e\[/)} marker=#{o.include?('XWPE_BREW_TEST_MARKER')}"
          puts "head=#{o[0, 220].inspect}"
          RUBY
          ruby /tmp/probe.rb
          echo "=== installed wpe with stdin/out as PIPES (surface any stderr it prints) ==="
          /tmp/xp/bin/wpe /tmp/h.c </dev/null >/tmp/wo.txt 2>/tmp/we.txt & p=$!; sleep 3; kill "$p" 2>/dev/null || true; wait "$p" 2>/dev/null || true
          echo "stdout bytes: $(wc -c </tmp/wo.txt) ; stderr:"; cat /tmp/we.txt | head -20
          true   # diagnostic step: never let the killed-child exit status fail the job

      - name: Diagnostic - old read_nonblock poll (expected to be flaky on Intel)
        if: always()   # evidence step: run regardless of earlier outcomes
        # Kept as evidence only: this is the loop the first Homebrew submission
        # shipped. On EOF read_nonblock(exception: false) returns nil, which is
        # not a String, so the loop sleeps and retries instead of stopping -- a
        # fast-exiting or fast-EOF child leaves output empty until the 30s
        # timeout. continue-on-error: it documents the bug, it does not gate CI.
        continue-on-error: true
        run: |
          cat > /tmp/brew_test_old.rb <<'RUBY'
          require "pty"
          require "io/console"
          require "timeout"
          require "tmpdir"

          marker = "XWPE_BREW_TEST_MARKER"
          Dir.mktmpdir do |dir|
            path = File.join(dir, "hello.c")
            File.write(path, "// #{marker}\nint main(void) { return 0; }\n")
            ENV["TERM"] = "xterm-256color"

            output = +""
            PTY.spawn("./wpe", path) do |r, w, pid|
              r.winsize = [24, 80]
              begin
                Timeout.timeout(30) do
                  loop do
                    chunk = r.read_nonblock(4096, exception: false)
                    if chunk.is_a?(String)
                      output << chunk
                      break if output.include?(marker)
                    else
                      sleep 0.1
                    end
                  end
                end
                w.write "\ex"
              rescue Timeout::Error, Errno::EIO
                nil
              ensure
                begin
                  Process.kill("TERM", pid)
                rescue Errno::ESRCH
                  nil
                end
              end
            end

            puts "captured #{output.bytesize} bytes; ESC[=#{output.match?(/\e\[/)} marker=#{output.include?(marker)}"
            raise "OLD-LOGIC FAILED (empty/short capture)" unless output.match?(/\e\[/) && output.include?(marker)
            puts "old-logic OK"
          end
          RUBY
          ruby /tmp/brew_test_old.rb

      - name: Console mouse probe
        if: always()    # the macOS-specific guard: run it even if a test above failed
        # macOS keeps openpty() in libc, so no -lutil (unlike the BSDs/glibc).
        run: |
          cc -O2 -o /tmp/probe contrib/bsd-test/sgr_mouse_probe.c
          /tmp/probe ./we xterm-256color

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-logs-${{ matrix.runner }}
          path: "*.log"
          if-no-files-found: ignore
